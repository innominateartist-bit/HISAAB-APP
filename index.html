{ship.map((s,i)=>{const sc=STATS[s.status];const fm=FREI.find(f=>f.id===s.fmode);const isE=ex===s.id;return <div key={s.id} className="fu" style={{animationDelay:i*30+"ms",background:t.c,border:"1px solid "+t.bd,borderRadius:12,marginBottom:8,overflow:"hidden",boxShadow:t.sh,borderLeft:"4px solid "+sc.c}}>
<div style={{padding:"11px 12px",cursor:"pointer"}} onClick={()=>sEx(isE?null:s.id)}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}><div><div style={{fontSize:12,fontWeight:700}}>{s.party} <span style={{fontSize:9,color:t.tx2,fontWeight:400}}>📍{s.city}</span></div><div style={{fontSize:11,color:t.tx2}}>{s.items}</div></div><Chp color={sc.c}>{sc.i}{sc.l}</Chp></div>
<div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:2}}>
{s.sent&&<span style={{fontSize:9,fontWeight:600,padding:"2px 6px",borderRadius:5,background:t.c2,color:t.tx2}}>🗓️{fmtD(s.sent)}({dAgo(s.sent)})</span>}
{!s.sent&&<span style={{fontSize:9,fontWeight:600,padding:"2px 6px",borderRadius:5,background:t.c2,color:t.ac}}>⏳Not sent</span>}
<span style={{fontSize:9,fontWeight:600,padding:"2px 6px",borderRadius:5,background:(fm?.c||"#888")+"14",color:fm?.c}}>{s.fmode==="paid"?"✅Paid":s.fmode==="topay"?"📥ToPay":"📋TBB"}:{fmt(s.famt||0)}</span></div>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:10,color:t.tx2}}>{TRANS.find(x=>x.id===s.transport)?.l}·<b style={{color:t.tx}}>{s.carrier}</b></span>{s.bilti&&<span style={{fontSize:9,fontWeight:600,color:t.ac,fontFamily:"monospace"}}>#{s.bilti}</span>}<span style={{fontSize:13,color:t.tx3,transition:"transform .3s",transform:isE?"rotate(180deg)":"none"}}>▾</span></div></div>
{isE&&<div className="fi" style={{borderTop:"1px solid "+t.bd,padding:"11px 12px"}}>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5,marginBottom:8}}>{[["📦 Value",fmt(s.value)],["📏 Weight",s.weight||"—"],["🗃️ Boxes",s.boxes||"—"],["📍 From",s.from||"—"],["📍 To",s.to||"—"],["📅 ETA",fmtD(s.eta)]].map(([l,v])=><div key={l} style={{background:t.c2,borderRadius:7,padding:"5px 7px"}}><div style={{fontSize:8,color:t.tx3,fontWeight:600}}>{l}</div><div style={{fontSize:10,fontWeight:600}}>{v}</div></div>)}</div>
<div style={{background:(fm?.c||"#888")+"08",border:"1px solid "+(fm?.c||"#888")+"15",borderRadius:7,padding:"7px 9px",marginBottom:8}}><div style={{fontSize:9,fontWeight:700,color:fm?.c,marginBottom:2}}>💰 Freight</div><div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:10,color:t.tx2}}>{fm?.l}</span><span style={{fontSize:15,fontWeight:800}}>{fmt(s.famt||0)}</span></div>{s.freceipt&&<div style={{fontSize:9,color:t.ac,marginTop:1}}>Receipt:{s.freceipt}</div>}{s.fmode==="tbb"&&<div style={{fontSize:9,color:t.ac,fontWeight:600,marginTop:2}}>⚡Add to {s.party}'s khata</div>}</div>
{s.status==="delivered"&&<div style={{background:t.gn+"10",borderRadius:7,padding:"6px 9px",marginBottom:8,fontSize:10,color:t.gn,fontWeight:700}}>✅Delivered {fmtD(s.ddate)}</div>}
{s.notes&&<div style={{background:t.c2,borderRadius:7,padding:"5px 7px",marginBottom:8,fontSize:10,color:t.tx2,fontStyle:"italic"}}>📝{s.notes}</div>}
<div style={{display:"flex",alignItems:"center",marginBottom:8}}>{SORD.map((st2,j)=>{const ci=SORD.indexOf(s.status);return <div key={st2} style={{flex:1,display:"flex",alignItems:"center"}}><div style={{width:16,height:16,borderRadius:"50%",background:j<=ci?sc.c:t.bd,display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,color:"#fff",fontWeight:700,flexShrink:0}}>{j<=ci?"✓":""}</div>{j<4&&<div style={{flex:1,height:2,background:j<ci?sc.c:t.bd}}/>}</div>})}</div>
<div style={{display:"flex",gap:5}}>{s.status!=="delivered"&&<button onClick={()=>adv(s.id)} style={{flex:1,padding:9,borderRadius:9,background:t.sg,border:"none",color:"#fff",fontWeight:700,fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>{s.status==="packing"?"🚛 Dispatched":s.status==="dispatched"?"📦 Transit":s.status==="in_transit"?"🛵 OFD":"✅ Delivered"}</button>}<button onClick={()=>{try{navigator.clipboard.writeText("📦 "+s.items+"\n🚛 "+s.carrier+"\n#"+s.bilti+"\n💰"+(s.fmode==="paid"?"PAID":"TOPAY")+" "+fmt(s.famt||0)+"\n📍"+s.city)}catch(e){}st("Copied! 📲")}} style={{minWidth:36,padding:9,borderRadius:9,background:t.c2,border:"1px solid "+t.bd,color:t.tx,cursor:"pointer",fontSize:11}}>📲</button></div></div>}</div>})}</div>}

function ChatList({go,setSelC}){const{t}=useTheme();return <div style={{padding:"0 16px 96px",paddingTop:14}}><h1 className="fu" style={{fontSize:21,fontWeight:800,marginBottom:3}}>💬 Messages</h1><p style={{fontSize:9,color:t.tx2,marginBottom:12}}>🔒 Numbers masked · Encrypted</p>{CONTACTS.map((c,i)=><Crd key={c.id} style={{padding:"10px 12px",marginBottom:7}} onClick={()=>{setSelC(c);go("croom")}}><div style={{display:"flex",alignItems:"center",gap:9}}><div style={{width:38,height:38,borderRadius:9,background:t.ag,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:13}}>{c.name.charAt(0)}</div><div style={{flex:1}}><div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:12,fontWeight:600}}>{c.name}</span><span style={{fontSize:9,color:t.tx3}}>{c.last}</span></div><div style={{fontSize:10,color:t.tx2}}>📍{c.city}·⭐{c.bharosa}</div></div></div></Crd>)}</div>}

function ChatRoom({c,back,st}){const{t}=useTheme();const[mg,sMg]=useState("");const ref=useRef(null);const[ms,sMs]=useState([{id:"s1",f:"sys",b:"Chat with "+c.name+". Phone & email blocked. 🔒",tm:Date.now()-36e5},{id:"m1",f:"them",b:"Namaste! What parts do you need?",tm:Date.now()-3e6}]);
useEffect(()=>{ref.current?.scrollIntoView({behavior:"smooth"})},[ms]);
const send=()=>{if(!mg.trim())return;const sf=clean(mg.trim());if(hasPhone(sf)){sMs(p=>[...p,{id:"m"+Date.now(),f:"me",b:blockPhone(sf),tm:Date.now(),rd:true}]);sMg("");setTimeout(()=>sMs(p=>[...p,{id:"m"+Date.now(),f:"them",b:"System blocked contact info. Chat safely 🛡️",tm:Date.now()}]),1500);return}sMs(p=>[...p,{id:"m"+Date.now(),f:"me",b:sf,tm:Date.now()}]);sMg("");const rp=["Haan available!","10% off 100+pcs.","A+ grade.","3-5 din delivery.","Escrow se safe.","Fresh stock next week."];setTimeout(()=>sMs(p=>[...p,{id:"m"+Date.now(),f:"them",b:rp[Math.floor(Math.random()*rp.length)],tm:Date.now()}]),1200)};
return <div style={{display:"flex",flexDirection:"column",height:"100vh",maxWidth:480,margin:"0 auto",background:t.bg}}>
<div style={{padding:"9px 12px",borderBottom:"1px solid "+t.bd,background:t.c,display:"flex",alignItems:"center",gap:9}}><button onClick={back} style={{width:30,height:30,borderRadius:7,background:t.c2,border:"1px solid "+t.bd,cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",color:t.tx}}>←</button><Brg score={c.bharosa} size={28}/><div style={{flex:1}}><div style={{fontSize:12,fontWeight:600}}>{c.name}</div><div style={{fontSize:9,color:t.tx2}}>🔒 Encrypted·{c.city}</div></div></div>
<div style={{flex:1,overflowY:"auto",padding:"9px 12px"}}>{ms.map(m=><div key={m.id} style={{marginBottom:7,display:"flex",justifyContent:m.f==="sys"?"center":m.f==="me"?"flex-end":"flex-start"}}>{m.f==="sys"?<div style={{background:t.c2,color:t.tx2,padding:"4px 11px",borderRadius:7,fontSize:9,border:"1px solid "+t.bd}}>{m.b}</div>:<div style={{maxWidth:"78%",background:m.f==="me"?t.cm:t.ct,color:m.f==="me"?t.cmt:t.ctt,padding:"8px 11px",borderRadius:m.f==="me"?"13px 13px 3px 13px":"13px 13px 13px 3px",fontSize:12,lineHeight:1.4,border:m.f==="me"?"none":"1px solid "+t.bd}}>{m.rd&&<div style={{fontSize:9,color:t.rd,marginBottom:2}}>⚠️ Blocked</div>}{m.b}<div style={{fontSize:8,opacity:.5,marginTop:2,textAlign:"right"}}>{new Date(m.tm).toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"})}</div></div>}</div>)}<div ref={ref}/></div>
<div style={{padding:"7px 12px",borderTop:"1px solid "+t.bd,background:t.c,display:"flex",gap:5}}><Inp placeholder="Type message..." value={mg} onChange={e=>sMg(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} style={{flex:1}}/><button onClick={send} style={{padding:"9px 14px",borderRadius:9,background:t.sg,border:"none",color:"#fff",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>→</button></div></div>}

function SecPg(){const{t}=useTheme();const ch=["🔐 AES-256 Encryption","🛡️ XSS Sanitization","📵 Contact Masking","🔑 PKCE Auth","🧱 SQL Injection Guard","📋 Row Level Security","🔄 CSRF Protection","🌐 HTTPS/TLS 1.3","📱 Biometric Lock","🗂️ Encrypted Storage"];
return <div style={{padding:"0 16px 96px",paddingTop:14}}><h1 className="fu" style={{fontSize:21,fontWeight:800,marginBottom:12}}>🔒 Security</h1><Crd style={{padding:12,marginBottom:12,background:t.gn+"10",borderColor:t.gn+"30"}}><div style={{display:"flex",alignItems:"center",gap:9}}><span style={{fontSize:18}}>🛡️</span><div><div style={{fontSize:14,fontWeight:700,color:t.gn}}>All Secure</div><div style={{fontSize:10,color:t.tx2}}>10/10 active</div></div></div></Crd>{ch.map((c,i)=><Crd key={c} style={{padding:"10px 12px",marginBottom:4}}><div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}><span style={{fontSize:12,fontWeight:600}}>{c}</span><div style={{width:6,height:6,borderRadius:"50%",background:t.gn,boxShadow:"0 0 5px "+t.gn+"40"}}/></div></Crd>)}</div>}

function ProfPg({u,tO,tY,go,logout}){const{t,mode,setMode}=useTheme();
return <div style={{padding:"0 16px 96px",paddingTop:14}}><Crd style={{padding:"18px 14px",marginBottom:12,textAlign:"center"}}><div style={{width:56,height:56,borderRadius:14,background:t.sg,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:20,fontWeight:800,color:"#fff",marginBottom:7}}>{u.name.charAt(0)}</div><h2 style={{fontSize:19,fontWeight:800}}>{u.name}</h2><div style={{fontSize:11,color:t.tx2}}>📍{u.city}·{u.alias}</div><Chp color={t.gn} style={{marginTop:5}}>⭐Bharosa:{u.bharosa}/100</Chp></Crd>
<Crd style={{padding:"12px 14px",marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{display:"flex",alignItems:"center",gap:7}}><span style={{fontSize:15}}>{mode==="light"?"☀️":"🌙"}</span><div><div style={{fontSize:12,fontWeight:600}}>Theme</div><div style={{fontSize:10,color:t.tx2}}>{mode==="light"?"Light":"Dark"}</div></div></div><button onClick={()=>setMode(mode==="light"?"dark":"light")} style={{width:46,height:24,borderRadius:12,background:mode==="dark"?t.ac:t.bd,border:"none",cursor:"pointer",position:"relative"}}><div style={{width:18,height:18,borderRadius:"50%",background:"#fff",position:"absolute",top:3,left:mode==="dark"?25:3,transition:"left .3s"}}/></button></div></Crd>
<Crd style={{padding:0,overflow:"hidden",marginBottom:10}}>{[["Network",CONTACTS.length+" parties","👥"],["Receivable",fmt(tO),"💰"],["Payable",fmt(tY),"💸"],["Since",u.joined,"📅"]].map(([l,v,i],idx)=><div key={l} style={{display:"flex",justifyContent:"space-between",padding:"10px 13px",borderBottom:idx<3?"1px solid "+t.bd:"none"}}><span style={{fontSize:11,color:t.tx2}}>{i}{l}</span><span style={{fontSize:12,fontWeight:600}}>{v}</span></div>)}</Crd>
<Crd style={{padding:"11px 13px",marginBottom:10}} onClick={()=>go("sec")}><div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}><div style={{display:"flex",alignItems:"center",gap:7}}><span>🔒</span><div><div style={{fontSize:12,fontWeight:600}}>Security</div><div style={{fontSize:10,color:t.gn}}>All secure ✓</div></div></div><span style={{color:t.tx3}}>›</span></div></Crd>
<button onClick={logout} style={{width:"100%",padding:12,background:"transparent",border:"1.5px solid "+t.rd+"40",borderRadius:9,color:t.rd,fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>Logout</button></div>}

function Nav({pg,go,od}){const{t}=useTheme();return <nav style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,zIndex:50,background:t.nv,backdropFilter:"blur(12px)",borderTop:"1px solid "+t.bd}}><div style={{display:"flex",justifyContent:"space-around",padding:"4px 0 7px"}}>{[["home","🏠","Home"],["khata","📒","Khata"],["bazaar","🔍","Bazaar"],["maal","📦","Maal"],["chat","💬","Chat"]].map(([id,ic,lb])=>{const ac=pg===id||(id==="home"&&["home","dukaan","sec"].includes(pg));return <button key={id} onClick={()=>go(id)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:1,padding:"3px 7px",position:"relative",color:ac?t.ac:t.tx3,fontSize:18}}>{ic}<span style={{fontSize:9,fontWeight:ac?700:400}}>{lb}</span>{id==="khata"&&od>0&&<span style={{position:"absolute",top:0,right:1,width:13,height:13,background:t.rd,color:"#fff",fontSize:8,fontWeight:700,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center"}}>{od}</span>}</button>})}</div></nav>}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
