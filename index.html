function Crd({children,style,onClick}){const{t}=useT();return <div style={{background:t.c,border:"1px solid "+t.bd,borderRadius:13,boxShadow:t.sh,cursor:onClick?"pointer":"default",transition:"all .2s",...style}} onClick={onClick}>{children}</div>}

function Brg({score,size}){const sz=size||40;const c=score>=80?"#1A9A5C":score>=60?"#D4841A":"#D94040";const r=sz/2-3;return <div style={{position:"relative",width:sz,height:sz,flexShrink:0}}><svg width={sz} height={sz}><circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke="#88888820" strokeWidth="3"/><circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke={c} strokeWidth="3" strokeDasharray={score/100*2*Math.PI*r+" 999"} strokeLinecap="round" transform={`rotate(-90 ${sz/2} ${sz/2})`}/></svg><span style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:sz*.28,color:c}}>{score}</span></div>}

/* ═══ AUTH SYSTEM ═══ */
function AuthPage({onAuth}){
const[m,sM]=useState("login");const[ph,sPh]=useState("");const[em,sEm]=useState("");const[nm,sNm]=useState("");const[ct,sCt]=useState("Delhi");const[pw,sPw]=useState("");const[pw2,sPw2]=useState("");const[otp,sOtp]=useState("");const[rOtp,sROtp]=useState("");const[err,sErr]=useState("");const[rec,sRec]=useState("phone");
const is={width:"100%",background:"#fff1",border:"1.5px solid #fff2",color:"#fff",padding:"13px",borderRadius:10,fontSize:14,outline:"none",fontFamily:"inherit"};
const btn={width:"100%",height:50,background:"linear-gradient(135deg,#D4841A,#C27315)",color:"#fff",border:"none",borderRadius:10,fontWeight:700,fontSize:15,cursor:"pointer",fontFamily:"inherit"};
const lnk={background:"none",border:"none",color:"#E89A3A",fontSize:13,cursor:"pointer",fontFamily:"inherit",padding:"8px 0"};
const doSignup=()=>{sErr("");if(!nm.trim()){sErr("Name required");return}if(!ph||ph.length<10){sErr("10-digit phone required");return}if(!em||!em.includes("@")){sErr("Valid email required");return}if(!pw||pw.length<6){sErr("Password min 6 chars");return}if(pw!==pw2){sErr("Passwords don't match");return}try{const us=JSON.parse(localStorage.getItem("h_users")||"[]");if(us.find(u=>u.phone===ph)){sErr("Phone already registered");return}if(us.find(u=>u.email===em.toLowerCase())){sErr("Email already registered");return}const user={uid:genUID(),name:nm.trim(),phone:ph,email:em.toLowerCase(),city:ct,pwHash:hashPw(pw),alias:nm.trim().substring(0,2).toUpperCase()+Math.floor(Math.random()*9e3+1e3),bharosa:75,joined:new Date().toLocaleDateString("en-IN",{month:"long",year:"numeric"})};us.push(user);localStorage.setItem("h_users",JSON.stringify(us));localStorage.setItem("h_sess",JSON.stringify({uid:user.uid}));onAuth(user)}catch(e){sErr("Error")}};
const doLogin=()=>{sErr("");const inp=(ph||em).trim();if(!inp){sErr("Enter phone or email");return}if(!pw){sErr("Enter password");return}try{const us=JSON.parse(localStorage.getItem("h_users")||"[]");const user=us.find(u=>u.phone===inp||u.email===inp.toLowerCase());if(!user){sErr("Account not found");return}if(user.pwHash!==hashPw(pw)){sErr("Wrong password");return}localStorage.setItem("h_sess",JSON.stringify({uid:user.uid}));onAuth(user)}catch(e){sErr("Error")}};
const doForgot=()=>{sErr("");const inp=rec==="phone"?ph:em;if(!inp){sErr("Enter your "+rec);return}try{const us=JSON.parse(localStorage.getItem("h_users")||"[]");const user=us.find(u=>rec==="phone"?u.phone===inp:u.email===inp.toLowerCase());if(!user){sErr("Account not found");return}const code=genOTP();sROtp(code);sM("otp");setTimeout(()=>alert("Your OTP: "+code+"\n\n(In production: sent via SMS/Email)"),300)}catch(e){sErr("Error")}};
const verifyOtp=()=>{sErr("");if(otp!==rOtp){sErr("Wrong OTP");return}sM("reset");sPw("");sPw2("")};
const doReset=()=>{sErr("");if(!pw||pw.length<6){sErr("Min 6 chars");return}if(pw!==pw2){sErr("Passwords don't match");return}try{const inp=rec==="phone"?ph:em;const us=JSON.parse(localStorage.getItem("h_users")||"[]");const i=us.findIndex(u=>rec==="phone"?u.phone===inp:u.email===inp.toLowerCase());if(i===-1){sErr("Error");return}us[i].pwHash=hashPw(pw);localStorage.setItem("h_users",JSON.stringify(us));localStorage.setItem("h_sess",JSON.stringify({uid:us[i].uid}));onAuth(us[i])}catch(e){sErr("Error")}};
const titles={login:"Welcome Back",signup:"Create Account",forgot:"Forgot Password",otp:"Enter OTP",reset:"New Password"};
const subs={login:"Sign in with phone/email",signup:"Unique ID · Password · OTP recovery",forgot:"Recover via Phone or Email",otp:"Enter 6-digit code",reset:"Set new password"};
return <div style={{minHeight:"100vh",background:"linear-gradient(170deg,#1B2A4A,#0E1828)",padding:"40px 24px 30px",display:"flex",flexDirection:"column"}}><div className="fu"><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:22}}><div style={{width:40,height:40,background:"linear-gradient(135deg,#D4841A,#E89A3A)",borderRadius:11,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:20,fontWeight:800,color:"#fff"}}>₹</span></div><span style={{fontWeight:800,fontSize:21,color:"#fff"}}>Hisaab</span></div><h2 style={{fontSize:24,fontWeight:800,color:"#fff",lineHeight:1.2,marginBottom:4}}>{titles[m]}</h2><p style={{color:"#7B8DA6",fontSize:13}}>{subs[m]}</p></div>
{err&&<div style={{marginTop:12,background:"#F0707020",border:"1px solid #F0707040",borderRadius:10,padding:"10px 14px",fontSize:12,color:"#F07070"}}>{err}</div>}
<div className="fu" style={{animationDelay:".1s",marginTop:14,display:"flex",flexDirection:"column",gap:10}}>
{m==="signup"&&<><input style={is} placeholder="Name / Business Name *" value={nm} onChange={e=>sNm(e.target.value)}/><div style={{position:"relative"}}><span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",color:"#7B8DA6",fontSize:13}}>🇮🇳+91</span><input style={{...is,paddingLeft:72}} placeholder="Phone *" value={ph} onChange={e=>sPh(e.target.value.replace(/\D/g,"").slice(0,10))} type="tel"/></div><input style={is} placeholder="Email *" value={em} onChange={e=>sEm(e.target.value)} type="email"/><select style={is} value={ct} onChange={e=>sCt(e.target.value)}>{["Delhi","Mumbai","Bangalore","Hyderabad","Chennai","Kolkata","Ahmedabad","Jaipur","Gurgaon","Lucknow"].map(c=><option key={c} value={c} style={{color:"#1B2A4A"}}>{c}</option>)}</select><input style={is} placeholder="Password * (min 6)" value={pw} onChange={e=>sPw(e.target.value)} type="password"/><input style={is} placeholder="Confirm Password *" value={pw2} onChange={e=>sPw2(e.target.value)} type="password"/><button onClick={doSignup} style={btn}>Create Account 🚀</button><div style={{textAlign:"center"}}><button onClick={()=>{sM("login");sErr("")}} style={lnk}>Have account? Sign In</button></div></>}
{m==="login"&&<><input style={is} placeholder="Phone or Email *" value={ph||em} onChange={e=>{const v=e.target.value;if(v.includes("@")){sEm(v);sPh("")}else{sPh(v.replace(/\D/g,"").slice(0,10));sEm("")}}}/><input style={is} placeholder="Password *" value={pw} onChange={e=>sPw(e.target.value)} type="password"/><button onClick={doLogin} style={btn}>Sign In →</button><div style={{display:"flex",justifyContent:"space-between"}}><button onClick={()=>{sM("forgot");sErr("");sPw("")}} style={{...lnk,fontSize:12,color:"#7B8DA6"}}>Forgot Password?</button><button onClick={()=>{sM("signup");sErr("");sPw("")}} style={lnk}>Create Account</button></div></>}
{m==="forgot"&&<><div style={{display:"flex",gap:8,marginBottom:4}}>{[["phone","📱 Phone"],["email","📧 Email"]].map(([k,l])=><button key={k} onClick={()=>sRec(k)} style={{flex:1,padding:10,borderRadius:10,fontSize:12,fontWeight:600,background:rec===k?"#D4841A20":"#fff1",color:rec===k?"#E89A3A":"#7B8DA6",border:rec===k?"2px solid #D4841A":"1.5px solid #fff2",cursor:"pointer",fontFamily:"inherit"}}>{l}</button>)}</div>{rec==="phone"?<div style={{position:"relative"}}><span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",color:"#7B8DA6",fontSize:13}}>🇮🇳+91</span><input style={{...is,paddingLeft:72}} placeholder="Registered Phone" value={ph} onChange={e=>sPh(e.target.value.replace(/\D/g,"").slice(0,10))} type="tel"/></div>:<input style={is} placeholder="Registered Email" value={em} onChange={e=>sEm(e.target.value)} type="email"/>}<button onClick={doForgot} style={btn}>Send OTP →</button><div style={{textAlign:"center"}}><button onClick={()=>{sM("login");sErr("")}} style={lnk}>Back to Sign In</button></div></>}
{m==="otp"&&<><div style={{textAlign:"center",padding:"8px 0"}}><div style={{fontSize:40,marginBottom:6}}>📲</div><p style={{color:"#7B8DA6",fontSize:12}}>OTP sent to {rec==="phone"?"+91 "+ph.substring(0,3)+"***":em.substring(0,3)+"***"}</p></div><input style={{...is,fontSize:24,textAlign:"center",letterSpacing:8}} placeholder="● ● ● ● ● ●" value={otp} onChange={e=>sOtp(e.target.value.replace(/\D/g,"").slice(0,6))} maxLength={6}/><button onClick={verifyOtp} style={btn}>Verify OTP ✓</button><div style={{textAlign:"center"}}><button onClick={()=>{const c=genOTP();sROtp(c);alert("New OTP: "+c)}} style={{...lnk,fontSize:12,color:"#7B8DA6"}}>Resend OTP</button></div></>}
{m==="reset"&&<><div style={{textAlign:"center",padding:"6px 0"}}><div style={{fontSize:32}}>🔒</div><p style={{color:"#30D090",fontSize:13,fontWeight:600}}>OTP Verified ✓</p></div><input style={is} placeholder="New Password * (min 6)" value={pw} onChange={e=>sPw(e.target.value)} type="password"/><input style={is} placeholder="Confirm Password *" value={pw2} onChange={e=>sPw2(e.target.value)} type="password"/><button onClick={doReset} style={btn}>Reset & Sign In →</button></>}
</div><div style={{marginTop:"auto",paddingTop:12,display:"flex",gap:10,justifyContent:"center"}}>{["🔒 Encrypted","📲 OTP Recovery","🔑 Unique ID"].map(x=><span key={x} style={{fontSize:10,color:"#3E5070"}}>{x}</span>)}</div></div>}

/* ═══ MAIN APP ═══ */
function App(){
const[mode,setMode]=useState("light");const[pg,setPg]=useState("splash");const[user,setUser]=useState(null);const[txn,setTxn]=useState(D_TXN);const[inv,setInv]=useState(D_INV);const[ship,setShip]=useState(D_SHIP);const[selC,setSelC]=useState(null);const[selCat,setSelCat]=useState(null);const[toast,setToast]=useState(null);const t=mode==="dark"?DK:LT;

useEffect(()=>{try{const s=localStorage.getItem("h_sess");if(s){const{uid}=JSON.parse(s);const us=JSON.parse(localStorage.getItem("h_users")||"[]");const u=us.find(x=>x.uid===uid);if(u){setUser(u);const d=localStorage.getItem("hd_"+uid);if(d){const p=JSON.parse(d);if(p.inv)setInv(p.inv);if(p.txn)setTxn(p.txn);if(p.ship)setShip(p.ship);if(p.mode)setMode(p.mode)}setPg("home");return}}setTimeout(()=>setPg("auth"),1800)}catch(e){setTimeout(()=>setPg("auth"),1800)}},[]);

const st=useCallback((m)=>{setToast(m);setTimeout(()=>setToast(null),2500)},[]);
const tO=useMemo(()=>CONTACTS.reduce((a,c)=>a+c.owes,0),[]);
const tY=useMemo(()=>CONTACTS.reduce((a,c)=>a+c.youOwe,0),[]);

<Crd style={{padding:0,overflow:"hidden",marginBottom:12}}><div style={{padding:"10px 13px",borderBottom:"1px solid "+t.bd,fontSize:9,fontWeight:600,textTransform:"uppercase",letterSpacing:.5,color:t.tx2}}>Account Details</div>{[["📱 Phone","+91 "+user.phone?.substring(0,3)+"***"+user.phone?.substring(7)],["📧 Email",user.email?.substring(0,3)+"***@***"],["🔑 User ID",user.uid],["📅 Joined",user.joined],["🏙️ City",user.city]].map(([l,v],i)=><div key={l} style={{display:"flex",justifyContent:"space-between",padding:"10px 13px",borderBottom:i<4?"1px solid "+t.bd:"none"}}><span style={{fontSize:11,color:t.tx2}}>{l}</span><span style={{fontSize:12,fontWeight:600}}>{v}</span></div>)}</Crd>

/* ═══ CHAT ROOM ═══ */
function ChatRoom({c,t,back,st}){
const[mg,sMg]=useState("");const ref=useRef(null);
const[ms,sMs]=useState([{id:"s1",f:"sys",b:"Chat with "+c.name+". Phone & email auto-blocked. 🔒",tm:Date.now()-36e5},{id:"m1",f:"them",b:"Namaste! What parts do you need?",tm:Date.now()-3e6}]);
useEffect(()=>{ref.current?.scrollIntoView({behavior:"smooth"})},[ms]);
const send=()=>{if(!mg.trim())return;const sf=clean(mg.trim());if(hasContact(sf)){sMs(p=>[...p,{id:"m"+Date.now(),f:"me",b:blockContact(sf),tm:Date.now(),rd:1}]);sMg("");setTimeout(()=>sMs(p=>[...p,{id:"m"+Date.now(),f:"them",b:"Contact info blocked. Chat safely on Hisaab 🛡️",tm:Date.now()}]),1500);return}sMs(p=>[...p,{id:"m"+Date.now(),f:"me",b:sf,tm:Date.now()}]);sMg("");const rp=["Haan available!","10% off 100+ pcs.","A+ grade, tested.","3-5 din delivery.","Escrow se safe.","Fresh stock next week."];setTimeout(()=>sMs(p=>[...p,{id:"m"+Date.now(),f:"them",b:rp[Math.floor(Math.random()*rp.length)],tm:Date.now()}]),1200)};
return <div style={{display:"flex",flexDirection:"column",height:"100vh",maxWidth:480,margin:"0 auto",background:t.bg}}>
<div style={{padding:"9px 12px",borderBottom:"1px solid "+t.bd,background:t.c,display:"flex",alignItems:"center",gap:9}}><button onClick={back} style={{width:30,height:30,borderRadius:7,background:t.c2,border:"1px solid "+t.bd,cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",color:t.tx}}>←</button><Brg score={c.bharosa} size={28}/><div style={{flex:1}}><div style={{fontSize:12,fontWeight:600}}>{c.name}</div><div style={{fontSize:9,color:t.tx2}}>🔒 Encrypted · {c.city}</div></div></div>
<div style={{flex:1,overflowY:"auto",padding:"9px 12px"}}>{ms.map(m=><div key={m.id} style={{marginBottom:7,display:"flex",justifyContent:m.f==="sys"?"center":m.f==="me"?"flex-end":"flex-start"}}>{m.f==="sys"?<div style={{background:t.c2,color:t.tx2,padding:"4px 11px",borderRadius:7,fontSize:9,border:"1px solid "+t.bd}}>{m.b}</div>:<div style={{maxWidth:"78%",background:m.f==="me"?t.cm:t.ct,color:m.f==="me"?t.cmt:t.ctt,padding:"8px 11px",borderRadius:m.f==="me"?"13px 13px 3px 13px":"13px 13px 13px 3px",fontSize:12,lineHeight:1.4,border:m.f==="me"?"none":"1px solid "+t.bd}}>{m.rd?<div style={{fontSize:9,color:"#F07070",marginBottom:2}}>⚠️ Contact Blocked</div>:null}{m.b}<div style={{fontSize:8,opacity:.5,marginTop:2,textAlign:"right"}}>{new Date(m.tm).toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"})}</div></div>}</div>)}<div ref={ref}/></div>
<div style={{padding:"7px 12px",borderTop:"1px solid "+t.bd,background:t.c,display:"flex",gap:5}}><Inp placeholder="Type message..." value={mg} onChange={e=>sMg(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} style={{flex:1}}/><button onClick={send} style={{padding:"9px 14px",borderRadius:9,background:t.sg,border:"none",color:"#fff",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>→</button></div></div>}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
